name: BD Algolia Sync

on:
  workflow_dispatch:  # manual trigger + cron-job.org webhook

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests "algoliasearch>=3,<4"

      - name: Debug
        run: |
          echo "--- user search with output_type array ---"
          curl -s -X POST "https://learn.everyavenue.com/api/v2/user/search" \
            -H "X-Api-Key: 98d5e69e4f7ee03b3d92eeaf7138a1b6" \
            -H "Content-Type: application/json" \
            -d '{"output_type":"array","action":"search","limit":2,"page":1}' | head -c 1000
          echo ""
          echo "--- data_posts search with q field ---"
          curl -s -X POST "https://learn.everyavenue.com/api/v2/data_posts/search" \
            -H "X-Api-Key: 98d5e69e4f7ee03b3d92eeaf7138a1b6" \
            -H "Content-Type: application/json" \
            -d '{"output_type":"array","action":"search","data_id":"6","q":"","limit":2,"page":1}'
          echo ""

      - name: Run sync
        env:
          BD_API_KEY:         ${{ secrets.BD_API_KEY }}
          ALGOLIA_APP_ID:     ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_WRITE_KEY:  ${{ secrets.ALGOLIA_WRITE_KEY }}
          ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
        run: python bd_algolia_sync_v3.py
