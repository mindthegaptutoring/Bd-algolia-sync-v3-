name: BD Algolia Sync

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests "algoliasearch>=3,<4"

      - name: Debug photo fields
        run: |
          curl -s "https://learn.everyavenue.com/api/v2/user/get?property=user_id&property_value=43" \
            -H "X-Api-Key: 98d5e69e4f7ee03b3d92eeaf7138a1b6" \
            | python3 -c "
import sys, json
d = json.load(sys.stdin)
msg = d.get('message', [])
u = msg[0] if isinstance(msg, list) and msg else {}
for k, v in u.items():
    if any(x in k.lower() for x in ['photo', 'image', 'logo', 'pic', 'avatar', 'cover']):
        print(f'{k}: {repr(v)}')
print('photos_schema:', repr(u.get('photos_schema')))
"

      - name: Run sync
        env:
          BD_API_KEY:         ${{ secrets.BD_API_KEY }}
          ALGOLIA_APP_ID:     ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_WRITE_KEY:  ${{ secrets.ALGOLIA_WRITE_KEY }}
          ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
        run: python bd_algolia_sync_v3.py
