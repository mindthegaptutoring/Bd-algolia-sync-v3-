name: BD Algolia Sync

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests "algoliasearch>=3,<4"

      - name: Debug photo fields
        env:
          BD_API_KEY: ${{ secrets.BD_API_KEY }}
        run: |
          python3 - <<'PYEOF'
import requests, json, os
key = os.environ["BD_API_KEY"]
resp = requests.get(
    "https://learn.everyavenue.com/api/v2/user/get",
    headers={"X-Api-Key": key},
    params={"property": "user_id", "property_value": "43"}
)
u = resp.json().get("message", [{}])[0]
for k, v in u.items():
    if any(x in k.lower() for x in ["photo", "image", "logo", "pic", "avatar", "cover"]):
        print(k, ":", repr(v))
print("photos_schema:", repr(u.get("photos_schema")))
PYEOF

      - name: Run sync
        env:
          BD_API_KEY:         ${{ secrets.BD_API_KEY }}
          ALGOLIA_APP_ID:     ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_WRITE_KEY:  ${{ secrets.ALGOLIA_WRITE_KEY }}
          ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
        run: python bd_algolia_sync_v3.py
